name = "smart-memo"
main = "worker.js"
compatibility_date = "2024-09-23"

[assets]
directory = "."
binding = "ASSETS"

[vars]
# GEMINI_API_KEY는 [vars]에 선언하지 마세요 — Dashboard Secret이 덮어써집니다.
# 설정 방법:
#   로컬:      .dev.vars 파일에 GEMINI_API_KEY=실제키 입력
#   프로덕션:  Cloudflare Dashboard > Workers > Settings > Variables and Secrets
#              또는: wrangler secret put GEMINI_API_KEY
